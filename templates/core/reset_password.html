{% extends "core/base_auth.html" %}
{% block title %}Reset Password | Eventify{% endblock %}
{% block content %}
  <div class="auth-page">
    <div class="auth-overlay"></div>
    <div class="auth-card small">
      <h1>Reset Password</h1>
      <p>Set your new password and continue to dashboard.</p>

      {% if messages %}
        {% for message in messages %}
          <div class="flash flash-{{ message.tags }}" data-auto-dismiss="true">{{ message }}</div>
        {% endfor %}
      {% endif %}

      <form action="{% url 'reset_password' %}" method="post">
        {% csrf_token %}
        <label>New Password</label>
        <input name="password" type="password" placeholder="New password" required />

        <label>Confirm Password</label>
        <input
          name="confirmPassword"
          type="password"
          placeholder="Confirm new password"
          required
        />

        <button type="submit" class="primary-btn">Reset Password</button>
      </form>
    </div>
  </div>
{% endblock %}
