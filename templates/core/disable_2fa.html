{% extends "core/base_app.html" %}
{% block title %}Disable 2FA | Eventify{% endblock %}
{% block content %}
  <section class="page-head">
    <h1>Disable Two-Factor Authentication</h1>
    <p>Confirm your password to disable 2FA.</p>
  </section>

  <section class="card">
    <form method="post">
      {% csrf_token %}
      <label for="disable-2fa-password">Password</label>
      <input id="disable-2fa-password" type="password" name="password" required />
      <button type="submit" class="danger-btn">Disable 2FA</button>
    </form>
    <div class="action-row" style="margin-top: 12px;">
      <a href="{% url 'settings' %}" class="small-btn">Back to Settings</a>
    </div>
  </section>
{% endblock %}
